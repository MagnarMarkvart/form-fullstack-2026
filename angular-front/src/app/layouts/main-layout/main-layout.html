<div class="min-h-screen bg-slate-50">
  <header class="border-b border-slate-200 bg-white">
    <div class="mx-auto flex max-w-3xl items-center justify-between gap-4 px-6 py-4">
      <span class="text-sm font-semibold tracking-wide text-slate-800 uppercase">
        Helmes Sector Registration
      </span>

      <div class="flex items-center gap-3">
        @if (userName()) {
          <p class="text-sm text-slate-600">
            Welcome,
            <span class="font-medium text-slate-900">{{ userName() }}</span>!
          </p>

          @if (isOnView()) {
            <a
              routerLink="/"
              class="rounded-md border border-slate-300 bg-white px-3 py-1.5 text-xs font-medium text-slate-700 hover:bg-slate-50"
            >
              Edit form
            </a>
          } @else {
            <a
              routerLink="/view"
              class="rounded-md border border-slate-300 bg-white px-3 py-1.5 text-xs font-medium text-slate-700 hover:bg-slate-50"
            >
              View summary
            </a>
          }
        } @else {
          <p class="text-sm text-slate-500">
            Please fill the form!
          </p>
        }
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-3xl px-6 py-10">
    @if (sessionLoadError()) {
      <p role="alert" class="mb-6 rounded-md border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
        {{ sessionLoadError() }}
      </p>
    }
    <router-outlet />
  </main>
</div>
